<div class="box">
    <h3 class="title is-4">📈 Velocity{% if velocity_rolling_avg %} ({{ velocity_rolling_avg }}M Avg){% endif %}</h3>
    <div class="buttons are-small">
        <button class="button {% if velocity_rolling_avg %}is-info{% endif %}"
                hx-get="{% url 'ui_web:team_velocity_chart' %}?member_group_id={{ member_group_id }}{% if not velocity_rolling_avg %}&rolling_avg=3{% endif %}"
                hx-target="#team-velocity-chart-container"
                hx-swap="innerHTML"
                hx-indicator="#loading-indicator">
            Rolling Average
        </button>
    </div>
    <canvas id="teamVelocityChart" width="400" height="200"></canvas>
    <p class="help has-text-grey">Click on a data point to see task details below</p>
</div>

<script>
(function() {
    function initTeamVelocityChart() {
        if (typeof Chart === 'undefined') {
            setTimeout(initTeamVelocityChart, 100);
            return;
        }

        if (window.teamVelocityChartInstance) {
            window.teamVelocityChartInstance.destroy();
            window.teamVelocityChartInstance = null;
        }

        const canvas = document.getElementById('teamVelocityChart');
        if (!canvas) {
            console.error('Team velocity chart canvas not found');
            return;
        }

        const chartData = {{ month_velocity|safe }};
        const taskDetailsBaseUrl = '{% url "ui_web:team_velocity_tasks" %}';
        const memberGroupId = '{{ member_group_id }}';

        if (chartData && chartData.labels && chartData.data) {
            window.teamVelocityChartInstance = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: chartData.data.map(item => ({
                        label: item.developer,
                        data: item.metrics,
                        borderColor: item.color,
                        backgroundColor: item.color,
                        fill: false,
                        tension: 0.1
                    }))
                },
                options: {
                    responsive: true,
                    onClick: function(event, elements) {
                        if (!elements || elements.length === 0) return;
                        const period = chartData.labels[elements[0].index];
                        const url = taskDetailsBaseUrl + '?period=' + encodeURIComponent(period)
                            + '&member_group_id=' + encodeURIComponent(memberGroupId);
                        htmx.ajax('GET', url, {target: '#task-details-container', swap: 'innerHTML'}).then(function() {
                            document.getElementById('task-details-container').scrollIntoView({behavior: 'smooth'});
                        });
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            usePointStyle: true,
                            itemSort: (a, b) => b.raw - a.raw
                        }
                    }
                }
            });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initTeamVelocityChart);
    } else {
        initTeamVelocityChart();
    }
})();
</script>
