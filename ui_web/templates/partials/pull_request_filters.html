{% if author_options %}
<form class="pr-filters box mb-4"
      hx-get="{% url 'ui_web:partials_pull_requests' %}"
      hx-trigger="submit"
      hx-target="#main-content"
      hx-indicator="#loading-indicator"
      hx-push-url="true">
    <input type="hidden" name="member_group_id" value="{{ selected_member_group_id|default:'' }}">
    <div class="columns is-multiline is-vcentered is-variable is-2">
        <div class="column is-narrow">
            <div class="select is-small is-fullwidth">
                <select name="author">
                    <option value="">All Authors</option>
                    {% for author in author_options %}
                    <option value="{{ author }}" {% if author == selected_author %}selected{% endif %}>{{ author }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="column is-narrow">
            <button type="submit" class="button is-small is-primary">
                <span class="icon is-small"><i class="iconoir-check"></i></span>
                <span>Apply</span>
            </button>
        </div>
        {% if selected_author %}
        <div class="column is-narrow">
            <a class="button is-small is-light"
               hx-get="{% url 'ui_web:partials_pull_requests' %}?member_group_id={{ selected_member_group_id|urlencode }}"
               hx-target="#main-content"
               hx-indicator="#loading-indicator"
               hx-push-url="true">
                <span class="icon is-small"><i class="iconoir-xmark"></i></span>
                <span>Clear filter</span>
            </a>
        </div>
        {% endif %}
    </div>
</form>
{% endif %}
