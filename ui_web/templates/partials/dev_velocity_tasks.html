<div class="box">
    <div class="level mb-3">
        <div class="level-left">
            <h4 class="title is-5 mb-0">Tasks — {{ period }}</h4>
        </div>
        <div class="level-right">
            <button class="delete" onclick="this.closest('.box').parentElement.innerHTML = ''"></button>
        </div>
    </div>

    {% if error %}
    <article class="message is-danger">
        <div class="message-body">{{ error }}</div>
    </article>
    {% elif developer_groups %}
    {% include "partials/group_renderer.html" with items=developer_groups %}

    <div class="level mt-4 pt-3" style="border-top: 2px solid #dbdbdb;">
        <div class="level-left">
            <strong>Total</strong>
        </div>
        <div class="level-right">
            <span class="mr-4"><strong>{{ total_developer_sp|floatformat:2 }} SP</strong></span>
            <span><strong>{{ total_developer_time|floatformat:1 }}h</strong></span>
        </div>
    </div>
    {% else %}
    <p>No tasks found for this period.</p>
    {% endif %}
</div>
